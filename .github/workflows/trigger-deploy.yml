name: Trigger Deployment

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint .

      - name: Build app
        run: npm run build

  trigger-deployment:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy repo
        run: |
          curl -fsS -X POST \
            -H "Authorization: token ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/SMART-NYUAD/deploy/dispatches \
            -d '{"event_type":"deploy"}'
