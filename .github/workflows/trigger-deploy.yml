name: Trigger Deployment

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  trigger-deployment:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy repo
        run: |
          curl -fsS -X POST \
            -H "Authorization: token ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/SMART-NYUAD/deploy/dispatches \
            -d '{"event_type":"deploy"}'
